set -g @plugin 'jabirali/tmux-tilish'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'roosta/tmux-fuzzback'
set -g @plugin 'spywhere/tmux-now-playing'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin "janoamaral/tokyo-night-tmux"

set -g @thumbs-reverse enabled
set -g @thumbs-unique enabled
set -g @thumbs-command 'tmux set-buffer {} && echo -n {} | pbcopy'
set -g @thumbs-upcase-command 'tmux set-buffer {} && echo -n {} | pbcopy && tmux paste-buffer'

set -g @fuzzback-popup 1
set -g @fuzzback-popup-size '99%'
set -g @fuzzback-bind 'M-f'
set -g @fuzzback-table 'root'

set -g @now-playing-status-format '🎧 {icon} {scrollable} [{position}/{duration}]'
set -g @now-playing-paused-icon '■'
set -g @now-playing-playing-icon '▶︎'

set -g @tilish-default 'main-vertical'
set -g @tilish-shiftnum '!"£$%^&*()'

if 'test ! -d ~/.tmux/plugins/tpm' \
   'run "git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins"'

set-environment -g PATH '/opt/homebrew/bin:/usr/local/bin:/bin:/usr/bin'
run '~/.tmux/plugins/tpm/tpm'
run-shell ~/.tmux/plugins/tmux-thumbs/tmux-thumbs.tmux

set -ga terminal-features "*:hyperlinks"
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*-256color*:Tc"

set -g mouse on
set-option -g focus-events on
set-option -g prefix C-a
set-option -s escape-time 0
setw -g automatic-rename on
setw -g xterm-keys on

bind-key C-a send-prefix
bind-key -n 'M-q' confirm kill-pane
bind-key -n 'M-Q' confirm kill-window
bind-key -n 'M-space' thumbs-pick
bind-key -n 'M-x' set -w synchronize-panes

# Tmux navigation
version_pat='s/^tmux[^0-9]*([.0-9]+).*/\1/p'

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n M-Left if-shell "$is_vim" "send-keys M-Left" "select-pane -L"
bind-key -n M-Down if-shell "$is_vim" "send-keys M-Down" "select-pane -D"
bind-key -n M-Up if-shell "$is_vim" "send-keys M-Up" "select-pane -U"
bind-key -n M-Right if-shell "$is_vim" "send-keys M-Right" "select-pane -R"
tmux_version="$(-V | sed -En "$version_pat")"
setenv -g tmux_version "$tmux_version"

bind-key -T copy-mode-vi M-Left select-pane -L
bind-key -T copy-mode-vi M-Down select-pane -D
bind-key -T copy-mode-vi M-Up select-pane -U
bind-key -T copy-mode-vi M-Right select-pane -R

# Colors
BACKGROUND='#1a1b26'
FOREGROUND='#c0caf5'
HIGHLIGHT='#2ac3de'
ACTIVITY='#394b70'

# Theme
set -g base-index 1
set -g display-panes-active-colour $HIGHLIGHT
set -g display-panes-colour $FOREGROUND
set -g mode-style bg=$HIGHLIGHT,fg=$BACKGROUND
set -g pane-active-border-style fg=$HIGHLIGHT,bg=default
set -g pane-border-style fg=default
set -g status-position top
set -g status-style fg=$FOREGROUND,bg=$BACKGROUND

set -g status 2
set -g status-format[1] '#[align=centre] #(~/.tmux/plugins/tmux-now-playing/scripts/music.sh)'
set -g status-interval 5
set -g status-left '💩  '
set -g status-right '%a %h-%d %H:%M'

setw -g pane-base-index 1
setw -g window-status-activity-style bg=$BACKGROUND,fg=$ACTIVITY,dim
setw -g window-status-current-format ' #I:#W '
setw -g window-status-current-style bg=default,fg=$HIGHLIGHT,bold
setw -g window-status-format ' #I:#W '
setw -g window-status-last-style fg=$FOREGROUND,bold
setw -g window-status-style bg=default,fg=$FOREGROUND,dim
