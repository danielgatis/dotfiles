set -g @plugin 'jabirali/tmux-tilish'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'roosta/tmux-fuzzback'
set -g @plugin 'spywhere/tmux-now-playing'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tpm'

set -g @thumbs-reverse enabled
set -g @thumbs-unique enabled

set -g @fuzzback-popup 1
set -g @fuzzback-popup-size '90%'
set -g @fuzzback-bind 'M-f'
set -g @fuzzback-table 'root'

set -g @now-playing-status-format '🎧 {icon} {scrollable} [{position}/{duration}]'
set -g @now-playing-paused-icon '■'
set -g @now-playing-playing-icon '▶︎'

set -g @tilish-default 'main-vertical'
set -g @tilish-shiftnum '!"£$%^&*()'
set -g @tilish-navigator 'on'

if 'test ! -d ~/.tmux/plugins/tpm' \
   'run "git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins"'

set-environment -g PATH '/opt/homebrew/bin:/usr/local/bin:/bin:/usr/bin'
run '~/.tmux/plugins/tpm/tpm'

set -ag terminal-overrides ',xterm-256color:RGB'
set-option -g default-terminal 'screen-256color'
set -g mouse on
set-option -g focus-events on
set-option -g prefix C-a
set-option -s escape-time 0
setw -g automatic-rename on
setw -g xterm-keys on

bind-key C-a send-prefix
bind-key -n 'M-q' confirm kill-pane
bind-key -n 'M-Q' confirm kill-window
bind-key -n 'M-space' thumbs-pick

run-shell ~/.tmux/plugins/tmux-thumbs/tmux-thumbs.tmux

# Colors
BACKGROUND='#1a1b26'
FOREGROUND='#c0caf5'
HIGHLIGHT='#2ac3de'
ACTIVITY='#394b70'

# Panes
set -g pane-border-style fg=default
set -g pane-active-border-style fg=$HIGHLIGHT,bg=default

set -g display-panes-colour $FOREGROUND
set -g display-panes-active-colour $HIGHLIGHT

# Mode
set -g mode-style bg=$HIGHLIGHT,fg=$BACKGROUND

# Windows
setw -g window-status-format ' #I:#W '
setw -g window-status-style bg=default,fg=$FOREGROUND,dim
setw -g window-status-last-style fg=$FOREGROUND,bold

setw -g window-status-current-format ' #I:#W '
setw -g window-status-current-style bg=default,fg=$HIGHLIGHT,bold
setw -g window-status-activity-style bg=$BACKGROUND,fg=$ACTIVITY,dim

# Base index ( start counting from 1 )
set -g base-index 1
setw -g pane-base-index 1

# Status Top
set -g status-position top

# Status Colors
set -g status-style fg=$FOREGROUND,bg=$BACKGROUND

# Status contents
set -g status-interval 5
set -g status 3
set -g status-left '💩  '
set -g status-right '%a %h-%d %H:%M'
set -g status-format[1] '#[align=centre] #(~/.tmux/plugins/tmux-now-playing/scripts/music.sh)'
